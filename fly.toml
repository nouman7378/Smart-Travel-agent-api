# fly.toml app configuration file generated for smart-travel on 2026-05-17T17:42:01+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smart-travel'
primary_region = 'sin'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python wait_for_db.py && python manage.py migrate --noinput'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
